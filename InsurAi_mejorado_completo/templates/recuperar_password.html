{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña · InzurAI+</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

    <div class="onboarding-container">
        <div class="logo-arriba">
            <img src="{% static 'imagenes/inzur.svg' %}" alt="InzurAI+ Logo">
        </div>
        
        <div class="onboarding-card" style="min-height: 400px;">
            <div class="welcome-message">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu correo electrónico y te enviaremos las instrucciones.</p>
            </div>

            <div class="error-zone">
                {% if messages %}
                    {% for message in messages %}
                        <span class="error-text-login" style="background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb;">
                            {{ message }}
                        </span>
                    {% endfor %}
                {% endif %}
            </div>

            <form method="POST" action="{% url 'recuperar_password' %}">
                {% csrf_token %}
                
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" class="input-field" name="username" placeholder="Ej: admin" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="input-field" name="email" placeholder="ejemplo@zynapxe.com" required>
                </div>

                <button type="submit" class="btn-ingresar">
                    Enviar Enlace
                </button>
            </form>

            <a href="{% url 'login' %}" class="forgot-link" style="margin-top: 15px;">Volver al Login</a>

            <div class="powered-by">
                powered by 
                <img src="{% static 'imagenes/Zynaoxe (2).png' %}" alt="Zynapxe" class="logo-footer">
            </div>
        </div>
    </div>
</body>
</html>
