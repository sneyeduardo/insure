{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña · InzurAI+</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

    <div class="onboarding-container">
        <div class="logo-arriba">
            <img src="{% static 'imagenes/inzur.svg' %}" alt="InzurAI+ Logo">
        </div>
        
        <div class="onboarding-card" style="min-height: 400px;">
            <div class="welcome-message">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu cédula y correo electrónico para enviarte las instrucciones.</p>
            </div>

            <div class="error-zone">
                {% if messages %}
                    {% for message in messages %}
                        <span class="error-text-login" style="background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb;">
                            {{ message }}
                        </span>
                    {% endfor %}
                {% endif %}
            </div>

            <form method="POST" action="{% url 'recuperar_password' %}" onsubmit="armarCedulaRecuperar()">
                {% csrf_token %}
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <label for="login-cedula-numero" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Cédula de Identidad</label>
                    <div style="display: flex; border: 1px solid #ced4da; border-radius: 4px; overflow: hidden; background-color: #fff;">
                        <select id="login-tipo-cedula" style="font-size: 1.1rem; font-weight: bold; padding: 10px 15px; border: none; border-right: 1px solid #ced4da; background: #f8f9fa; outline: none; cursor: pointer;" onchange="armarCedulaRecuperar()">
                            <option value="V">V</option>
                            <option value="E">E</option>
                        </select>
                        <input type="text" id="login-cedula-numero" placeholder="12345678" maxlength="10" required
                               style="width: 100%; border: none; padding: 10px 15px; font-size: 1.1rem; outline: none; font-family: monospace;"
                               oninput="this.value = this.value.replace(/[^0-9]/g, ''); armarCedulaRecuperar();">
                    </div>
                    <input type="hidden" name="cedula" id="cedula-final" value="">
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="input-field" name="email" placeholder="ejemplo@zynapxe.com" required>
                </div>

                <button type="submit" class="btn-ingresar">
                    Enviar Enlace
                </button>
            </form>

            <a href="{% url 'login' %}" class="forgot-link" style="margin-top: 15px;">Volver al Login</a>

            <div class="powered-by">
                powered by 
                <img src="{% static 'imagenes/Zynaoxe (2).png' %}" alt="Zynapxe" class="logo-footer">
            </div>
        </div>
    </div>

    <script>
        function armarCedulaRecuperar() {
            const tipo = document.getElementById('login-tipo-cedula').value;
            const numero = document.getElementById('login-cedula-numero').value;
            document.getElementById('cedula-final').value = tipo + '-' + numero;
        }

        document.addEventListener("DOMContentLoaded", function() {
            armarCedulaRecuperar();
        });
    </script>
</body>
</html>
