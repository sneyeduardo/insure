{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña · InzurAI+</title>
    <link rel="stylesheet" href="{% static 'cambiar_password.css' %}">
</head>
<body>

    <div class="onboarding-container">
        <div class="logo-arriba">
            <img src="{% static 'imagenes/inzur.svg' %}" alt="InzurAI+ Logo">
        </div>
        
        <div class="onboarding-card" style="min-height: 480px;">
            <div class="welcome-message">
                <h2>Crear Nueva Contraseña</h2>
                <p>Hola, <strong>{{ nombre }}</strong>. Ingresa tu nueva clave de acceso.</p>
            </div>

            <div class="error-zone">
                {% if error_msg %}
                    <span class="error-text-login">{{ error_msg }}</span>
                {% endif %}
            </div>

            <form method="POST" action="{% url 'cambiar_password' token %}" id="form-cambio-clave">
                {% csrf_token %}
                
                <div class="input-group" style="position: relative;">
                    <label for="password">Nueva Contraseña</label>
                    <input type="password" id="password" class="input-field" name="password" required>
                    
                    <small id="caps-warning" style="color: #856404; background-color: #fff3cd; padding: 6px; border-radius: 4px; display: none; margin-top: 5px; font-size: 0.8rem; border-left: 4px solid #ffe8a1;">
                        ⚠️ Bloq Mayús activado
                    </small>

                    <div class="password-strength-container" style="margin-top: 10px; background-color: #e9ecef; border-radius: 4px; height: 6px; width: 100%; overflow: hidden;">
                        <div id="strength-bar" style="height: 100%; width: 0%; border-radius: 4px; transition: all 0.3s ease;"></div>
                    </div>
                    <small id="strength-text" style="display: block; margin-top: 5px; font-size: 0.85rem; color: #6c757d; font-weight: 500;">
                        Seguridad: Ingresa una contraseña
                    </small>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Confirmar Contraseña</label>
                    <input type="password" id="confirm_password" class="input-field" name="confirm_password" required>
                    <small id="error-match" style="color: #dc3545; display: none; margin-top: 5px; font-size: 0.8rem;">
                        ❌ Las contraseñas no coinciden.
                    </small>
                </div>

                <button type="submit" class="btn-ingresar" id="btn-guardar" style="margin-top: 15px;">
                    Actualizar Contraseña
                </button>
            </form>

            <div class="powered-by">
                powered by 
                <img src="{% static 'imagenes/Zynaoxe (2).png' %}" alt="Zynapxe" class="logo-footer">
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('form-cambio-clave');
        const pass = document.getElementById('password');
        const confirmPass = document.getElementById('confirm_password');
        const errorMsg = document.getElementById('error-match');
        
        // Elementos nuevos
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        const capsWarning = document.getElementById('caps-warning');

        // 1. DETECTAR BLOQ MAYÚS
        pass.addEventListener('keyup', function(event) {
            if (event.getModifierState('CapsLock')) {
                capsWarning.style.display = 'block';
            } else {
                capsWarning.style.display = 'none';
            }
        });

        // 2. MEDIDOR DE FUERZA DE CONTRASEÑA
        pass.addEventListener('input', function() {
            const val = pass.value;
            let score = 0;

            // Criterios de evaluación
            if (val.length > 5) score += 1; // Longitud mínima
            if (val.length > 8) score += 1; // Longitud buena
            if (/[A-Z]/.test(val)) score += 1; // Contiene mayúscula
            if (/[0-9]/.test(val)) score += 1; // Contiene número
            if (/[^A-Za-z0-9]/.test(val)) score += 1; // Contiene carácter especial

            let color = '';
            let text = '';
            let width = '0%';

            // Asignación de colores y textos según el puntaje
            switch(score) {
                case 0:
                case 1:
                    width = '25%'; color = '#dc3545'; text = 'Seguridad: Baja'; break; // Rojo
                case 2:
                case 3:
                    width = '50%'; color = '#fd7e14'; text = 'Seguridad: Media'; break; // Naranja
                case 4:
                    width = '75%'; color = '#0d6efd'; text = 'Seguridad: Fuerte'; break; // Azul
                case 5:
                    width = '100%'; color = '#198754'; text = 'Seguridad: Muy Fuerte'; break; // Verde
            }

            // Si el campo está vacío, reseteamos
            if (val.length === 0) {
                width = '0%'; 
                text = 'Seguridad: Ingresa una contraseña';
                color = '#6c757d';
            }

            // Aplicamos los cambios visuales
            strengthBar.style.width = width;
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        });

        // 3. VALIDACIÓN AL ENVIAR EL FORMULARO
        form.addEventListener('submit', function(event) {
            if (pass.value !== confirmPass.value) {
                event.preventDefault(); // Detenemos el envío
                errorMsg.style.display = 'block';
                confirmPass.style.borderColor = '#dc3545';
            } else {
                errorMsg.style.display = 'none';
            }
        });
        
        // Bonus: Validar coincidencia en tiempo real al escribir en "Confirmar"
        confirmPass.addEventListener('input', function() {
            if (confirmPass.value.length > 0 && pass.value !== confirmPass.value) {
                errorMsg.style.display = 'block';
                confirmPass.style.borderColor = '#dc3545';
            } else {
                errorMsg.style.display = 'none';
                confirmPass.style.borderColor = '#ced4da'; // Vuelve al color normal
            }
        });
    </script>
</body>
</html>
